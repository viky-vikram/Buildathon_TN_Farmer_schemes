[theme]
base = "light"
primaryColor = "#176b45"
backgroundColor = "#f8fbf8"
secondaryBackgroundColor = "#eef7f0"
textColor = "#10231f"
font = "sans serif"

[client]
# Hide the developer toolbar and never show raw tracebacks in the browser.
toolbarMode = "viewer"
showErrorDetails = false

[server]
headless = true
enableCORS = true
enableXsrfProtection = true
maxUploadSize = 5

[browser]
gatherUsageStats = false
